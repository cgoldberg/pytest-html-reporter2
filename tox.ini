[tox]
envlist = py{313,py3}{,-ansi2html} #, linting
skip_missing_interpreters = true

[testenv]
setenv = PYTHONDONTWRITEBYTECODE=1
deps =
    bs4
    selenium
    Pillow
    flake8-noqa
    py{313,py3}-ansi2html: ansi2html
commands = pytest -v -r a {posargs}

[testenv:linting]
skip_install = True
basepython = python3
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure

[flake8]
max-line-length = 120
exclude = .eggs,.tox

[pytest]
testpaths = tests/unit/
