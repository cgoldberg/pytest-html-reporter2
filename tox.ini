[tox]
envlist =
    linting
    py39
    py310
    py311
    py312
    py313
    pypy3
skip_missing_interpreters = true

[testenv]
setenv = PYTHONDONTWRITEBYTECODE=1
deps =
    -r requirements.txt
commands = pytest -v -r a {posargs}

[testenv:linting]
skip_install = True
deps =
    flake8
    flake8-noqa
commands = flake8 --extend-exclude={env:VIRTUAL_ENV} .

[flake8]
max-line-length = 120

[pytest]
testpaths = tests/
